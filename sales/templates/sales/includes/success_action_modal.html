<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title operation-modal-text">{{ title }}</h5>
            </div>
            <div class="modal-body">
                <p class="mb-0 operation-modal-text">{{ message }}</p>
            </div>
            <div class="modal-footer">
                <a href="{{ ok_url }}" class="btn btn-primary">موافق</a>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const successModalElement = document.getElementById('{{ modal_id }}');
    if (successModalElement && window.bootstrap) {
        const successModal = new bootstrap.Modal(successModalElement, {
            backdrop: 'static',
            keyboard: false,
        });
        successModal.show();
    }
});
</script>
