<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title operation-modal-text">{{ title }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-0 operation-modal-text">{{ message|default:'هل انت متاكد من العمليه؟' }}</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">لا</button>
                <button type="button" class="btn btn-primary" id="{{ confirm_button_id }}">نعم</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const confirmButton = document.getElementById('{{ confirm_button_id }}');
    const targetForm = document.getElementById('{{ form_id }}');
    if (confirmButton && targetForm) {
        confirmButton.addEventListener('click', function () {
            if (typeof targetForm.requestSubmit === 'function') {
                targetForm.requestSubmit();
                return;
            }
            targetForm.submit();
        });
    }
});
</script>
