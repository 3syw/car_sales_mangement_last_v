{% extends "sales/base.html" %}
{% load ui_i18n %}

{% block extrahead %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
{% endblock %}

{% block extrastyle %}
<style>
    body {
        padding-top: 92px;
    }

    .welcome-shell {
        min-height: calc(100vh - 92px);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem 1.25rem;
    }

    .welcome-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.1rem;
        width: min(760px, 100%);
        padding-inline: clamp(0.4rem, 1vw, 1rem);
        animation: fade-up 0.9s cubic-bezier(0.2, 0.9, 0.25, 1) both;
    }

    .welcome-title {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.3rem;
        font-family: var(--font-primary);
        line-height: 1.15;
    }

    .welcome-greeting {
        font-size: clamp(1.9rem, 4vw, 3.2rem);
        font-weight: 300;
        color: rgba(255, 255, 255, 0.8);
    }

    .welcome-system {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.45rem;
        font-size: clamp(2.3rem, 5.2vw, 4.65rem);
        font-weight: 300;
        color: rgba(255, 255, 255, 0.88);
    }

    .welcome-system-name {
        font-weight: 800;
        color: #d7af6a;
        text-shadow:
            0 0 12px rgba(33, 46, 63, 0.24),
            0 0 28px rgba(33, 46, 63, 0.2),
            0 0 48px rgba(33, 46, 63, 0.12);
        animation: soft-glow-pulse 4.6s ease-in-out infinite;
    }

    .latin-tech,
    [lang="en"] {
        letter-spacing: 0.08em;
    }

    .welcome-start {
        margin: 0.35rem 0 0;
        min-width: 180px;
        padding: 0.9rem 2.8rem;
        border: 1px solid rgba(33, 46, 63, 0.55);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        font-family: var(--font-primary);
        font-size: clamp(1.78rem, 4vw, 3.42rem);
        font-weight: 700;
        color: rgba(242, 238, 232, 0.82);
        text-decoration: none;
        transition: transform 0.24s ease, color 0.24s ease, text-shadow 0.24s ease, background 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
        animation: fade-up 1.05s cubic-bezier(0.2, 0.9, 0.25, 1) 0.12s both;
    }

    .welcome-start:hover {
        color: #fff;
        background: linear-gradient(135deg, rgba(33, 46, 63, 0.92), rgba(219, 192, 144, 0.96));
        border-color: rgba(219, 192, 144, 0.9);
        transform: translateY(-6px);
        text-shadow: 0 0 18px rgba(255, 255, 255, 0.16);
        box-shadow: 0 24px 50px rgba(33, 46, 63, 0.24);
    }

    .welcome-start:focus-visible {
        outline: 2px solid rgba(33, 46, 63, 0.72);
        outline-offset: 8px;
        border-radius: 12px;
    }

    [data-theme="light"] .welcome-greeting {
        color: rgba(60, 40, 24, 0.86);
    }

    [data-theme="light"] .welcome-system {
        color: rgba(58, 38, 22, 0.9);
    }

    [data-theme="light"] .welcome-system-name {
        color: #8a5a1f;
        text-shadow:
            0 0 10px rgba(164, 110, 42, 0.18),
            0 0 24px rgba(164, 110, 42, 0.16),
            0 0 36px rgba(164, 110, 42, 0.08);
    }

    [data-theme="light"] .welcome-start {
        border-color: rgba(164, 110, 42, 0.45);
        background: rgba(255, 255, 255, 0.5);
        box-shadow: 0 18px 36px rgba(90, 59, 25, 0.16);
        color: rgba(60, 40, 24, 0.9);
    }

    [data-theme="light"] .welcome-start:hover {
        color: #fff;
        box-shadow: 0 24px 46px rgba(164, 110, 42, 0.22);
    }

    @keyframes fade-up {
        from {
            opacity: 0;
            transform: translateY(28px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes soft-glow-pulse {
        0%,
        100% {
            text-shadow:
                0 0 10px rgba(33, 46, 63, 0.2),
                0 0 22px rgba(33, 46, 63, 0.16),
                0 0 34px rgba(33, 46, 63, 0.08);
        }

        50% {
            text-shadow:
                0 0 14px rgba(219, 192, 144, 0.32),
                0 0 32px rgba(33, 46, 63, 0.24),
                0 0 54px rgba(33, 46, 63, 0.14);
        }
    }

    @media (max-width: 640px) {
        body {
            padding-top: 78px;
        }

        .welcome-shell {
            min-height: calc(100vh - 78px);
            padding: 1.25rem 0.9rem;
        }

        .welcome-stack {
            gap: 0.95rem;
        }

        .welcome-greeting {
            font-size: clamp(1.55rem, 6vw, 2.15rem);
        }

        .welcome-system {
            gap: 0.25rem;
            font-size: clamp(1.95rem, 8vw, 3rem);
        }

        .welcome-start {
            min-width: 150px;
            padding: 0.8rem 2.2rem;
            font-size: clamp(1.4rem, 6vw, 2rem);
        }
    }

    @media (max-width: 399.98px) {
        .welcome-shell {
            padding: 1rem 0.65rem;
        }

        .welcome-stack {
            gap: 0.8rem;
        }

        .welcome-start {
            min-width: 132px;
            padding: 0.72rem 1.6rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="welcome-shell">
    <div class="welcome-stack">
        <h1 class="welcome-title">
            <span class="welcome-greeting">{% ui 'مرحباً بك' %}</span>
            <span class="welcome-system">{% ui 'في نظام' %} <span class="welcome-system-name">{% ui 'المحاسب الذكي' %}</span></span>
        </h1>
        <a class="welcome-start" href="{% url 'login' %}">{% ui 'البدء' %}</a>
    </div>
</section>
{% endblock %}
