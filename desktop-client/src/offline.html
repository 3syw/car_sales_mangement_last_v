<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Sales Desktop - Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Cairo, Segoe UI, Tahoma, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1c2430 0%, #0f141c 62%, #0b1017 100%);
      color: #f2eee8;
    }
    .card {
      width: min(720px, calc(100% - 24px));
      border-radius: 18px;
      border: 1px solid rgba(201, 164, 106, 0.35);
      background: rgba(255, 255, 255, 0.06);
      padding: 24px;
      text-align: center;
    }
    h1 { margin-top: 0; color: #dbc090; }
    p { color: #d4cec5; line-height: 1.9; }
    code {
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 8px;
      border-radius: 8px;
      direction: ltr;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>تعذر فتح المنصة</h1>
    <p>تطبيق سطح المكتب يعمل الآن كواجهة مباشرة لنظام الويب، لذلك يجب تشغيل خادم Django أولاً.</p>
    <p>شغل الخادم على نفس العنوان:</p>
    <p><code>http://127.0.0.1:8102/login/</code></p>
  </div>
</body>
</html>
